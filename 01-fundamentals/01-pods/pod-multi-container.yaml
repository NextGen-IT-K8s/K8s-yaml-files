 
apiVersion: v1
kind: Pod
metadata:
  name: springboot-mongo-multi
  labels:
    app: springboot-mongo-app
    pattern: multi-container-demo
spec:
  containers:
    - name: login-container
      image: sanket7786/person-profile:v2
      ports:
        - containerPort: 8080
      env:
        - name: MONGO_DB_HOSTNAME
          value: "127.0.0.1"        # <-- localhost, because same pod!
        - name: MONGO_DB_USERNAME
          value: mongouser
        - name: MONGO_DB_PASSWORD
          value: admin@123
 
    - name: mongo-container
      image: mongo
      ports:
        - containerPort: 27017
      env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: mongouser
        - name: MONGO_INITDB_ROOT_PASSWORD
          value: admin@123
 
# --- Live demo ---
# kubectl apply -f pod-multi-container.yaml
# kubectl exec -it springboot-mongo-multi -c login-container -- sh
#   -> curl localhost:27017   (proves shared network namespace)
# kubectl logs springboot-mongo-multi -c mongo-container
